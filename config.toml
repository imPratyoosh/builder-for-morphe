[Twitter]
enabled = true
brand = "Twitter"
apkmirror-dlurl = "https://www.apkmirror.com/apk/x-corp/twitter"
uptodown-dlurl = "https://twitter.en.uptodown.com/android"
changelog-keywords = ["Twitter"]
version = "12.7.1-release.0"
arch = "arm64-v8a"

[Twitter.patches]
"github:crimera/piko" = { version = "dev", include = ["Browse tweet object", "Change version code"] }
"gitlab:inotia00/x-shim" = { version = "dev" }

[Instagram]
enabled = true
brand = "Instagram"
github-dlurl = "https://github.com/krvstek/uni-storage/releases/tag/instagram"
# apkmirror-dlurl = "https://www.apkmirror.com/apk/instagram/instagram-instagram"
uptodown-dlurl = "https://instagram.en.uptodown.com/android"
changelog-keywords = ["Instagram"]
arch = "arm64-v8a"
patcher-args = "-0appName='Instagram'"

[Instagram.patches]
"github:crimera/piko" = { version = "dev", include = ["Clone"], exclude = ["Change version code"] }

[Niagara-Launcher]
